services:
  postgres:
    image: postgres:16.2-bullseye
    container_name: parsers-postgres-16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  

volumes:
  postgres_data:
